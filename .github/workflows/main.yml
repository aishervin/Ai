name: Unzip files

on:
  push:                # به‌ازای هر push اجرا می‌شود
  workflow_dispatch:   # امکان اجرای دستی هم وجود دارد

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Run unzip script
        run: python unzip_files.py

      - name: Commit and push extracted files (optional)
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git diff --staged --quiet || git commit -m "Extract zip files to root"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
